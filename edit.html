<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>编辑 OI 比赛档案</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.3/dist/semantic.min.css">
<style>
body { margin: 0; background: #f5f5f5; }
.sidebar { width: 240px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; flex-shrink: 0; position: fixed; top: 0; left: 0; height: 100vh; z-index: 1; }
.sidebar-header { padding: 16px; border-bottom: 1px solid #eee; }
.sidebar-list { flex: 1; overflow-y: auto; }
.sidebar-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #f0f0f0; font-size: 13px; display: flex; justify-content: space-between; align-items: center; }
.sidebar-item:hover { background: #f0f7ff; }
.sidebar-item.active { background: #dbeafe; font-weight: 600; }
.sidebar-item .date { color: #888; font-size: 11px; }
.sidebar-item .enc-icon { font-size: 11px; }
.sidebar-actions { padding: 12px; border-top: 1px solid #eee; }
.sidebar-footer { padding: 8px 12px; border-top: 1px solid #eee; font-size: 11px; color: #888; text-align: center; }
.main { margin-left: 240px; overflow-y: auto; padding: 24px; min-height: 100vh; }
.form-row { display: flex; gap: 12px; margin-bottom: 10px; }
.form-row > * { flex: 1; min-width: 0; }
.checkbox-grid { display: flex; flex-wrap: wrap; gap: 3px 14px; padding: 6px 0; }
.custom-input-row { display: flex; gap: 6px; margin-top: 6px; }
.custom-input-row input.ui.input { flex: 1; }
.custom-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.empty-state { text-align: center; color: #999; padding: 20px; font-size: 13px; }
</style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-header">
        <h2 class="ui header" style="margin-bottom:8px;">OI 比赛档案</h2>
        <button class="ui primary fluid small button" onclick="newContest()">+ 新增比赛</button>
    </div>
    <div class="sidebar-list" id="sidebar-list">
        <div class="empty-state">暂无比赛，点击上方新增</div>
    </div>
    <div class="sidebar-actions">
        <button class="ui positive fluid button" onclick="saveContest()">保存</button>
        <button class="ui basic fluid small button" onclick="loadFromFile()" style="margin-top:6px;">导入</button>
        <input type="file" id="file-input" accept=".json" style="display:none" onchange="handleFileImport(event)">
    </div>
    <div class="sidebar-footer" id="sidebar-footer" style="cursor:pointer;" onclick="showUnlockModal()"></div>
</div>

<div class="main" id="main-content">
    <div class="empty-state" style="padding:60px 20px;">
        <p style="font-size:16px;color:#999;">选择左侧比赛进行编辑，或点击「新增比赛」</p>
    </div>
</div>

<div class="ui modal" id="password-modal">
    <div class="header">输入密码</div>
    <div class="content">
        <p style="font-size:13px;color:#888;">此档案部分内容已加密，输入密码后解锁编辑</p>
        <div class="ui fluid input">
            <input type="password" id="pw-unlock" placeholder="请输入密码" onkeydown="if(event.key==='Enter')submitUnlock()">
        </div>
        <div class="ui error message" id="pw-unlock-error" style="display:none;margin-top:8px;">密码错误</div>
    </div>
    <div class="actions">
        <button class="ui primary button" onclick="submitUnlock()">确定</button>
        <button class="ui button" onclick="cancelUnlock()">取消</button>
    </div>
</div>

<div class="ui modal" id="pw-setup-modal">
    <div class="header">设置加密密码</div>
    <div class="content">
        <p style="font-size:13px;color:#888;">首次加密需要设置密码，之后用此密码解锁</p>
        <div class="ui fluid input" style="margin-bottom:8px;">
            <input type="password" id="pw-setup" placeholder="输入密码" onkeydown="if(event.key==='Enter')document.getElementById('pw-setup-confirm').focus()">
        </div>
        <div class="ui fluid input">
            <input type="password" id="pw-setup-confirm" placeholder="再次输入密码" onkeydown="if(event.key==='Enter')submitSetup()">
        </div>
        <div class="ui error message" id="pw-setup-error" style="display:none;margin-top:8px;">两次输入的密码不一致</div>
    </div>
    <div class="actions">
        <button class="ui primary button" onclick="submitSetup()">确定</button>
        <button class="ui button" onclick="cancelSetup()">取消</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fomantic-ui@2.9.3/dist/semantic.min.js"></script>
<script>
// ==================== Crypto ====================
var PBKDF2_ITERATIONS = 600000;

async function sha256Bytes(str) {
    return new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str)));
}
function hex(b) {
    return Array.from(b).map(function(x) { return x.toString(16).padStart(2,'0'); }).join('');
}
function b64(b) {
    return btoa(String.fromCharCode(...b));
}
function fromB64(s) {
    return Uint8Array.from(atob(s), function(c) { return c.charCodeAt(0); });
}

async function pbkdf2(pw, salt, len) {
    var key = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveBits']);
    return new Uint8Array(await crypto.subtle.deriveBits(
        { name: 'PBKDF2', salt: salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' },
        key, len * 8
    ));
}

async function getVerifier(password, salt) {
    if (salt) return hex(await pbkdf2(password, new TextEncoder().encode(salt), 32));
    return hex(await sha256Bytes(password + ':v'));
}
async function deriveKey(password, salt) {
    if (salt) {
        var h = await pbkdf2(password, new TextEncoder().encode(salt + ':k'), 32);
        return await crypto.subtle.importKey('raw', h, { name: 'AES-GCM' }, false, ['encrypt','decrypt']);
    }
    var h = await sha256Bytes(password + ':k');
    return await crypto.subtle.importKey('raw', h, { name: 'AES-GCM' }, false, ['encrypt','decrypt']);
}
function getStoredAuth() {
    try {
        var raw = localStorage.getItem('oi_archive_key');
        return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
}
function setStoredAuth(verifier, keyB64) {
    try { localStorage.setItem('oi_archive_key', JSON.stringify({ verifier: verifier, key: keyB64 })); } catch(e) {}
}
function clearStoredAuth() {
    try { localStorage.removeItem('oi_archive_key'); } catch(e) {}
}

// ==================== Presets ====================
var presetTags = ['DP', '图论', '数据结构', '贪心', '数论', '字符串', '构造', '思维', 'Ad-Hoc', '模拟', '博弈论'];
var presetErrors = ['看错题', '算法不对', '实现bug', 'TLE', 'MLE', '边界情况', 'long long'];
var difficulties = ['暂无评定', '入门', '普及−', '普及/提高−', '普及+/提高', '提高+/省选−', '省选/NOI−', 'NOI/NOI+/CTSC'];

// ==================== State ====================
var contests = [];
var currentIdx = -1;
var storedVerifier = null;
var storedSalt = null;
var cryptoKeyB64 = null;

// ==================== Init ====================
fetch('data.json?t=' + Date.now())
    .then(function(r) { return r.json(); })
    .then(function(d) {
        storedVerifier = d.verifier || null;
        storedSalt = d.salt || null;
        contests = d.contests || [];
        contests.forEach(function(c) {
            if (c.encrypted) c._encrypted = true;
            else c._encrypted = false;
        });
        if (storedVerifier) {
            var auth = getStoredAuth();
            if (auth && auth.verifier === storedVerifier) {
                cryptoKeyB64 = auth.key;
                decryptAll().then(function(ok) {
                    if (ok) { renderSidebar(); if (contests.length > 0) selectContest(0); }
                });
            } else {
                renderSidebar();
                document.getElementById('main-content').innerHTML = '<div class="empty-state" style="padding:60px 20px;"><p style="font-size:16px;color:#999;">点击下方 🔒 输入密码后编辑</p></div>';
            }
        } else {
            renderSidebar();
            if (contests.length > 0) selectContest(0);
        }
    })
    .catch(function() {
        contests = [];
        renderSidebar();
    });

async function decryptAll() {
    if (!cryptoKeyB64) return false;
    try {
        var keyBytes = fromB64(cryptoKeyB64);
        var key = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['decrypt']);
        var ok = true;
        for (var i = 0; i < contests.length; i++) {
            var c = contests[i];
            if (c.encrypted && c.iv) {
                try {
                    var iv = fromB64(c.iv);
                    var enc = fromB64(c.encrypted);
                    var d = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: iv }, key, enc);
                    var dec = JSON.parse(new TextDecoder().decode(d));
                    for (var k in dec) { if (dec.hasOwnProperty(k)) c[k] = dec[k]; }
                    delete c.encrypted; delete c.iv;
                } catch(e) { ok = false; }
            }
        }
        return ok;
    } catch(e) { return false; }
}

async function encryptContestData(data) {
    var keyBytes = fromB64(cryptoKeyB64);
    var key = await crypto.subtle.importKey('raw', keyBytes, { name: 'AES-GCM' }, false, ['encrypt']);
    var iv = crypto.getRandomValues(new Uint8Array(12));
    var enc = await crypto.subtle.encrypt({ name: 'AES-GCM', iv: iv }, key, new TextEncoder().encode(JSON.stringify(data)));
    return { iv: b64(iv), encrypted: b64(new Uint8Array(enc)) };
}

// ==================== Password Modals ====================
function showUnlockModal() {
    if (cryptoKeyB64) return;
    $('#password-modal').modal({ closable: false }).modal('show');
    document.getElementById('pw-unlock').value = '';
    document.getElementById('pw-unlock-error').style.display = 'none';
    document.getElementById('pw-unlock').focus();
}

async function submitUnlock() {
    var pw = document.getElementById('pw-unlock').value.trim();
    if (!pw) return;
    var v = await getVerifier(pw, storedSalt);
    if (v !== storedVerifier) {
        document.getElementById('pw-unlock-error').style.display = '';
        document.getElementById('pw-unlock').value = '';
        document.getElementById('pw-unlock').focus();
        return;
    }
    var keyHash = storedSalt
        ? await pbkdf2(pw, new TextEncoder().encode(storedSalt + ':k'), 32)
        : await sha256Bytes(pw + ':k');
    cryptoKeyB64 = b64(keyHash);
    setStoredAuth(storedVerifier, cryptoKeyB64);
    var ok = await decryptAll();
    if (ok) {
        $('#password-modal').modal('hide');
        renderSidebar();
        if (contests.length > 0) selectContest(0);
    } else {
        document.getElementById('pw-unlock-error').textContent = '解密失败，请重试';
        document.getElementById('pw-unlock-error').style.display = '';
    }
}

function cancelUnlock() {
    $('#password-modal').modal('hide');
    document.getElementById('main-content').innerHTML = '<div class="empty-state" style="padding:60px 20px;"><p style="font-size:16px;color:#999;">需要密码才能编辑</p></div>';
    renderSidebar();
}

function showSetupModal() {
    $('#pw-setup-modal').modal({ closable: false }).modal('show');
    document.getElementById('pw-setup').value = '';
    document.getElementById('pw-setup-confirm').value = '';
    document.getElementById('pw-setup-error').style.display = 'none';
    document.getElementById('pw-setup').focus();
}

async function submitSetup() {
    var pw = document.getElementById('pw-setup').value;
    var confirm = document.getElementById('pw-setup-confirm').value;
    if (pw !== confirm) {
        document.getElementById('pw-setup-error').textContent = '两次输入的密码不一致';
        document.getElementById('pw-setup-error').style.display = '';
        return;
    }
    if (pw.length < 4) {
        document.getElementById('pw-setup-error').textContent = '密码至少 4 个字符';
        document.getElementById('pw-setup-error').style.display = '';
        return;
    }
    var saltBytes = crypto.getRandomValues(new Uint8Array(16));
    storedSalt = b64(saltBytes);
    storedVerifier = await getVerifier(pw, storedSalt);
    var keyHash = await pbkdf2(pw, new TextEncoder().encode(storedSalt + ':k'), 32);
    cryptoKeyB64 = b64(keyHash);
    setStoredAuth(storedVerifier, cryptoKeyB64);
    $('#pw-setup-modal').modal('hide');
    doSave();
}

function cancelSetup() {
    $('#pw-setup-modal').modal('hide');
}

// ==================== Sidebar ====================
function renderSidebar() {
    var list = document.getElementById('sidebar-list');
    var footer = document.getElementById('sidebar-footer');
    if (contests.length === 0) {
        list.innerHTML = '<div class="empty-state">暂无比赛</div>';
    } else {
        var html = '';
        for (var i = 0; i < contests.length; i++) {
            var c = contests[i];
            var active = i === currentIdx ? 'active' : '';
            var encIcon = c._encrypted ? '🔒' : '';
            html += '<div class="sidebar-item ' + active + '" onclick="selectContest(' + i + ')">' +
                '<div><div>' + (c.name || '未命名') + '</div><div class="date">' + (c.date || '无日期') + '</div></div>' +
                '<span class="enc-icon">' + encIcon + '</span></div>';
        }
        list.innerHTML = html;
    }
    if (storedVerifier && cryptoKeyB64) {
        footer.textContent = '🔒 已加密';
        footer.style.cursor = 'default';
    } else if (storedVerifier) {
        footer.textContent = '🔒 点击解锁';
        footer.style.cursor = 'pointer';
    } else {
        footer.textContent = '🔓 未加密';
        footer.style.cursor = 'default';
    }
}

// ==================== Select / New / Delete ====================
function selectContest(idx) {
    if (currentIdx >= 0) saveCurrentForm();
    currentIdx = idx;
    renderSidebar();
    loadForm(contests[idx]);
}

function newContest() {
    if (currentIdx >= 0) saveCurrentForm();
    var c = { date:'', name:'', link:'', rank:0, total:0, totalScore:0, expectedScore:0, overallReview:'', timeline:[{time:'',plan:'',completion:''}], problems:[], _encrypted:false };
    contests.unshift(c);
    currentIdx = 0;
    renderSidebar();
    loadForm(c);
    document.getElementById('main-content').scrollTop = 0;
}

function deleteContest(idx) {
    if (!confirm('确定删除这场比赛吗？')) return;
    contests.splice(idx, 1);
    if (currentIdx === idx) {
        currentIdx = -1;
        document.getElementById('main-content').innerHTML = '<div class="empty-state" style="padding:60px 20px;"><p style="font-size:16px;color:#999;">选择左侧比赛进行编辑</p></div>';
    } else if (currentIdx > idx) {
        currentIdx--;
    }
    renderSidebar();
}

// ==================== Form Builder ====================
function loadForm(c) {
    var html = '<div class="ui form">';

    // Contest info
    html += '<div class="ui segment">';
    html += '<h3 class="ui header" style="display:flex;align-items:center;gap:8px;margin-top:0;">比赛信息';
    html += '<div class="right floated" style="margin-left:auto;display:flex;align-items:center;gap:8px;">';
    html += '<div class="ui checkbox"><input type="checkbox" id="enc-toggle" ' + (c._encrypted ? 'checked' : '') + ' onchange="toggleEnc()"><label for="enc-toggle">加密此比赛</label></div>';
    html += '<button class="ui mini negative button" onclick="deleteContest(' + currentIdx + ')">删除</button>';
    html += '</div></h3>';
    html += '<div class="form-row">';
    html += '<div class="field"><label>比赛名称</label><input type="text" id="cf-name" value="' + escAttr(c.name) + '"></div>';
    html += '<div class="field"><label>比赛日期</label><input type="text" id="cf-date" value="' + escAttr(c.date) + '" placeholder="2025-06-25"></div>';
    html += '</div>';
    html += '<div class="field"><label>比赛链接</label><input type="text" id="cf-link" value="' + escAttr(c.link) + '" placeholder="https://..."></div>';
    html += '<div class="form-row">';
    html += '<div class="field"><label>排名</label><input type="number" id="cf-rank" value="' + (c.rank || '') + '"></div>';
    html += '<div class="field"><label>总人数</label><input type="number" id="cf-total" value="' + (c.total || '') + '"></div>';
    html += '<div class="field"><label>总分</label><input type="number" id="cf-totalScore" value="' + (c.totalScore || '') + '"></div>';
    html += '<div class="field"><label>期望得分</label><input type="number" id="cf-expectedScore" value="' + (c.expectedScore || '') + '"></div>';
    html += '</div>';
    html += '<div class="field"><label>总体回顾</label><textarea rows="4" id="cf-review">' + escHtml(c.overallReview) + '</textarea></div>';
    html += '</div>';

    // Timeline
    html += '<div class="ui segment">';
    html += '<h3 class="ui header" style="margin-top:0;">时间线</h3>';
    html += '<table class="ui compact celled table" id="tl-table"><thead><tr><th style="width:15%;">时间</th><th style="width:38%;">计划</th><th style="width:38%;">完成情况</th><th style="width:2%;"></th></tr></thead><tbody id="tl-body">';
    var tl = c.timeline && c.timeline.length > 0 ? c.timeline : [{time:'',plan:'',completion:''}];
    for (var i = 0; i < tl.length; i++) {
        html += tlRowHTML(tl[i].time, tl[i].plan, tl[i].completion);
    }
    html += '</tbody></table>';
    html += '<button class="ui basic small button" onclick="addTLRow()">+ 添加一行</button>';
    html += '</div>';

    // Problems
    html += '<div class="ui segment">';
    html += '<h3 class="ui header" style="margin-top:0;">题目</h3>';
    html += '<div id="problem-list">';
    if (c.problems && c.problems.length > 0) {
        for (var i = 0; i < c.problems.length; i++) {
            html += problemCardHTML(c.problems[i], i);
        }
    }
    html += '</div>';
    html += '<button class="ui primary small button" onclick="addProblem()">+ 添加题目</button>';
    html += '</div>';

    html += '</div>';
    document.getElementById('main-content').innerHTML = html;
}

function toggleEnc() {
    if (currentIdx < 0) return;
    contests[currentIdx]._encrypted = document.getElementById('enc-toggle').checked;
    renderSidebar();
}

// ==================== Timeline Rows ====================
function tlRowHTML(time, plan, completion) {
    return '<tr class="tl-row">' +
        '<td><div class="ui input"><input type="text" class="tl-time" value="' + escAttr(time) + '" placeholder="00:00"></div></td>' +
        '<td><div class="ui input"><input type="text" class="tl-plan" value="' + escAttr(plan) + '" placeholder="计划"></div></td>' +
        '<td><div class="ui input"><input type="text" class="tl-completion" value="' + escAttr(completion) + '" placeholder="完成情况"></div></td>' +
        '<td class="center aligned"><span style="cursor:pointer;color:#e74c3c;font-size:16px;" onclick="this.closest(\'tr\').remove()">✕</span></td>' +
    '</tr>';
}

function addTLRow() {
    var tbody = document.querySelector('#tl-body');
    if (!tbody) return;
    tbody.insertAdjacentHTML('beforeend', tlRowHTML('', '', ''));
}

// ==================== Problem Card ====================
function problemCardHTML(p, idx) {
    var html = '<div class="ui segment" style="padding:16px;margin-bottom:12px;background:#fafafa;" data-idx="' + idx + '">';
    html += '<h4 style="font-size:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;">题目 ' + (idx + 1) + ' <button class="ui mini negative button" onclick="removeProblem(this)">删除</button></h4>';
    html += '<div style="display:flex;flex-direction:column;gap:8px;">';

    html += '<div class="form-row">';
    html += '<div class="field"><label>题目名称</label><input type="text" class="p-name" value="' + escAttr(p.name) + '"></div>';
    html += '<div class="field"><label>题目链接</label><input type="text" class="p-link" value="' + escAttr(p.link) + '" placeholder="https://..."></div>';
    html += '</div>';

    html += '<div class="form-row">';
    html += '<div class="field"><label>得分</label><input type="number" class="p-score" value="' + (p.score || '') + '"></div>';
    html += '<div class="field"><label>期望得分</label><input type="number" class="p-expected" value="' + (p.expected || '') + '"></div>';
    html += '<div class="field"><label>满分</label><input type="number" class="p-fullScore" value="' + (p.fullScore || '') + '"></div>';
    html += '<div class="field"><label>难度</label><select class="p-difficulty">' + difficultyOptions(p.difficulty) + '</select></div>';
    html += '<div class="field"><div class="ui checkbox" style="margin-top:44px;"><input type="checkbox" class="p-isWeak" ' + (p.isWeak ? 'checked' : '') + '><label>薄弱 ⭐</label></div></div>';
    html += '</div>';

    html += '<div class="field"><label>标签</label><div class="checkbox-grid">';
    for (var i = 0; i < presetTags.length; i++) {
        var checked = (p.tags || []).indexOf(presetTags[i]) !== -1 ? 'checked' : '';
        html += '<div class="ui checkbox"><input type="checkbox" class="tag-cb" value="' + presetTags[i] + '" ' + checked + '><label>' + presetTags[i] + '</label></div>';
    }
    html += '</div>';
    var customTags = (p.tags || []).filter(function(t) { return presetTags.indexOf(t) === -1; });
    html += '<div class="custom-input-row">';
    html += '<div class="ui input"><input type="text" class="tag-custom" placeholder="自定义标签（回车添加）" onkeydown="if(event.key===\'Enter\')addCustomTag(this)"></div>';
    html += '<button class="ui basic mini button" onclick="addCustomTag(this.previousElementSibling.querySelector(\'input\'))">添加</button>';
    html += '</div>';
    html += '<div class="custom-tags">';
    for (var i = 0; i < customTags.length; i++) {
        html += '<span class="ui small label">' + escHtml(customTags[i]) + ' <i class="delete icon" style="cursor:pointer;margin:0;" onclick="this.parentElement.remove()"></i></span>';
    }
    html += '</div></div>';

    html += '<div class="field"><label>错误类型</label><div class="checkbox-grid">';
    for (var i = 0; i < presetErrors.length; i++) {
        var checked = (p.errorTypes || []).indexOf(presetErrors[i]) !== -1 ? 'checked' : '';
        html += '<div class="ui checkbox"><input type="checkbox" class="error-cb" value="' + presetErrors[i] + '" ' + checked + '><label>' + presetErrors[i] + '</label></div>';
    }
    html += '</div>';
    var customErrors = (p.errorTypes || []).filter(function(t) { return presetErrors.indexOf(t) === -1; });
    html += '<div class="custom-input-row">';
    html += '<div class="ui input"><input type="text" class="error-custom" placeholder="自定义错误（回车添加）" onkeydown="if(event.key===\'Enter\')addCustomError(this)"></div>';
    html += '<button class="ui basic mini button" onclick="addCustomError(this.previousElementSibling.querySelector(\'input\'))">添加</button>';
    html += '</div>';
    html += '<div class="custom-tags">';
    for (var i = 0; i < customErrors.length; i++) {
        html += '<span class="ui small label">' + escHtml(customErrors[i]) + ' <i class="delete icon" style="cursor:pointer;margin:0;" onclick="this.parentElement.remove()"></i></span>';
    }
    html += '</div></div>';

    html += '<div class="field"><label>部分分计划</label>';
    html += '<table class="ui compact celled table"><thead><tr><th style="width:15%;">实际</th><th style="width:15%;">预期</th><th style="width:15%;">满分</th><th style="width:48%;">描述</th><th style="width:2%;"></th></tr></thead><tbody class="ss-body">';
    var ss = p.subScores && p.subScores.length > 0 ? p.subScores : [{actual:'',expected:'',full:'',desc:''}];
    for (var i = 0; i < ss.length; i++) {
        html += '<tr class="ss-row"><td><div class="ui input"><input type="text" class="ss-actual" value="' + escAttr(ss[i].actual) + '"></div></td><td><div class="ui input"><input type="text" class="ss-expected" value="' + escAttr(ss[i].expected) + '"></div></td><td><div class="ui input"><input type="text" class="ss-full" value="' + escAttr(ss[i].full) + '"></div></td><td><div class="ui input"><input type="text" class="ss-desc" value="' + escAttr(ss[i].desc) + '" placeholder="描述"></div></td><td class="center aligned"><span style="cursor:pointer;color:#e74c3c;font-size:16px;" onclick="this.closest(\'tr\').remove()">✕</span></td></tr>';
    }
    html += '</tbody></table>';
    html += '<button class="ui basic mini button" onclick="addSSRow(this)">+ 添加一行</button></div>';

    html += '<div class="form-row">';
    html += '<div class="field"><label>数据、探索和反思</label><textarea rows="3" class="p-notes">' + escHtml(p.notes) + '</textarea></div>';
    html += '<div class="field"><label>其他情况</label><textarea rows="3" class="p-reflection">' + escHtml(p.reflection) + '</textarea></div>';
    html += '</div>';

    html += '</div></div>';
    return html;
}

function difficultyOptions(selected) {
    var html = '';
    for (var i = 0; i < difficulties.length; i++) {
        var sel = difficulties[i] === selected ? 'selected' : '';
        html += '<option value="' + difficulties[i] + '" ' + sel + '>' + difficulties[i] + '</option>';
    }
    return html;
}

function addProblem() {
    var list = document.getElementById('problem-list');
    if (!list) return;
    var idx = list.children.length;
    var div = document.createElement('div');
    div.innerHTML = problemCardHTML({name:'',link:'',score:0,expected:0,fullScore:0,difficulty:'暂无评定',tags:[],errorTypes:[],isWeak:false,subScores:[{actual:'',expected:'',full:'',desc:''}],notes:'',reflection:''}, idx);
    list.appendChild(div.firstElementChild);
}

function removeProblem(btn) {
    if (!confirm('确定删除这道题吗？')) return;
    btn.closest('.ui.segment').remove();
}

function addSSRow(btn) {
    var tbody = btn.closest('.ui.segment').querySelector('.ss-body');
    var tr = document.createElement('tr');
    tr.className = 'ss-row';
    tr.innerHTML = '<td><div class="ui input"><input type="text" class="ss-actual"></div></td><td><div class="ui input"><input type="text" class="ss-expected"></div></td><td><div class="ui input"><input type="text" class="ss-full"></div></td><td><div class="ui input"><input type="text" class="ss-desc" placeholder="描述"></div></td><td class="center aligned"><span style="cursor:pointer;color:#e74c3c;font-size:16px;" onclick="this.closest(\'tr\').remove()">✕</span></td>';
    tbody.appendChild(tr);
}

// ==================== Custom Tags / Errors ====================
function addCustomTag(input) {
    var val = input.value.trim();
    if (!val) return;
    var container = input.closest('.ui.segment').querySelector('.custom-tags');
    if (!container) return;
    var existing = container.querySelectorAll('.ui.label');
    for (var i = 0; i < existing.length; i++) {
        if (existing[i].textContent.trim() === val) { input.value = ''; return; }
    }
    var span = document.createElement('span');
    span.className = 'ui small label';
    span.innerHTML = escHtml(val) + ' <i class="delete icon" style="cursor:pointer;margin:0;" onclick="this.parentElement.remove()"></i>';
    container.appendChild(span);
    input.value = '';
}

function addCustomError(input) {
    var val = input.value.trim();
    if (!val) return;
    var containers = input.closest('.ui.segment').querySelectorAll('.custom-tags');
    var target = containers[containers.length - 1];
    if (!target) return;
    var existing = target.querySelectorAll('.ui.label');
    for (var i = 0; i < existing.length; i++) {
        if (existing[i].textContent.trim() === val) { input.value = ''; return; }
    }
    var span = document.createElement('span');
    span.className = 'ui small label';
    span.innerHTML = escHtml(val) + ' <i class="delete icon" style="cursor:pointer;margin:0;" onclick="this.parentElement.remove()"></i>';
    target.appendChild(span);
    input.value = '';
}

// ==================== Save Current Form ====================
function saveCurrentForm() {
    if (currentIdx < 0) return;
    var c = readForm();
    if (c) {
        c._encrypted = contests[currentIdx]._encrypted;
        contests[currentIdx] = c;
    }
}

function readForm() {
    if (currentIdx < 0) return null;
    var c = {
        date: (document.getElementById('cf-date') || {}).value || '',
        name: (document.getElementById('cf-name') || {}).value || '',
        link: (document.getElementById('cf-link') || {}).value || '',
        rank: parseInt((document.getElementById('cf-rank') || {}).value) || 0,
        total: parseInt((document.getElementById('cf-total') || {}).value) || 0,
        totalScore: parseInt((document.getElementById('cf-totalScore') || {}).value) || 0,
        expectedScore: parseInt((document.getElementById('cf-expectedScore') || {}).value) || 0,
        overallReview: (document.getElementById('cf-review') || {}).value || '',
        timeline: [],
        problems: []
    };
    document.querySelectorAll('#tl-body .tl-row').forEach(function(r) {
        c.timeline.push({ time: r.querySelector('.tl-time').value, plan: r.querySelector('.tl-plan').value, completion: r.querySelector('.tl-completion').value });
    });
    document.querySelectorAll('.ui.segment[data-idx]').forEach(function(card) {
        var containers = card.querySelectorAll('.custom-tags');
        var tags = [];
        card.querySelectorAll('.tag-cb:checked').forEach(function(cb) { tags.push(cb.value); });
        if (containers.length >= 1) {
            containers[0].querySelectorAll('.ui.label').forEach(function(tag) {
                var t = tag.textContent.trim();
                if (t) tags.push(t);
            });
        }
        var errors = [];
        card.querySelectorAll('.error-cb:checked').forEach(function(cb) { errors.push(cb.value); });
        if (containers.length >= 2) {
            containers[containers.length - 1].querySelectorAll('.ui.label').forEach(function(tag) {
                var t = tag.textContent.trim();
                if (t) errors.push(t);
            });
        }
        var ss = [];
        card.querySelectorAll('.ss-body .ss-row').forEach(function(r) {
            ss.push({ actual: r.querySelector('.ss-actual').value, expected: r.querySelector('.ss-expected').value, full: r.querySelector('.ss-full').value, desc: r.querySelector('.ss-desc').value });
        });
        c.problems.push({
            name: card.querySelector('.p-name').value,
            link: card.querySelector('.p-link').value,
            score: parseInt(card.querySelector('.p-score').value) || 0,
            expected: parseInt(card.querySelector('.p-expected').value) || 0,
            fullScore: parseInt(card.querySelector('.p-fullScore').value) || 0,
            difficulty: card.querySelector('.p-difficulty').value,
            tags: tags, errorTypes: errors,
            isWeak: card.querySelector('.p-isWeak').checked,
            subScores: ss,
            notes: card.querySelector('.p-notes').value,
            reflection: card.querySelector('.p-reflection').value
        });
    });
    return c;
}

// ==================== Save ====================
async function saveContest() {
    if (currentIdx >= 0) saveCurrentForm();
    var hasEncrypted = contests.some(function(c) { return c._encrypted; });
    if (hasEncrypted && !cryptoKeyB64) { showSetupModal(); return; }
    doSave();
}

async function doSave() {
    var output = { contests: [] };
    for (var i = 0; i < contests.length; i++) {
        var c = contests[i];
        if (c._encrypted && cryptoKeyB64) {
            var sensitive = { rank: c.rank||0, total: c.total||0, totalScore: c.totalScore||0, expectedScore: c.expectedScore||0, overallReview: c.overallReview||'', timeline: c.timeline||[], problems: c.problems||[] };
            var result = await encryptContestData(sensitive);
            output.contests.push({ name: c.name||'', date: c.date||'', link: c.link||'', encrypted: result.encrypted, iv: result.iv });
        } else {
            output.contests.push({ date: c.date||'', name: c.name||'', link: c.link||'', rank: c.rank||0, total: c.total||0, totalScore: c.totalScore||0, expectedScore: c.expectedScore||0, overallReview: c.overallReview||'', timeline: c.timeline||[], problems: c.problems||[] });
        }
    }
    if (storedVerifier) { output.verifier = storedVerifier; output.salt = storedSalt; }

    var json = JSON.stringify(output, null, 2);
    var blob = new Blob([json], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'data.json';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    renderSidebar();
    $('body').toast({ message: '保存成功！data.json 已下载', class: 'success', position: 'bottom right', displayTime: 2500 });
}

// ==================== Import ====================
function loadFromFile() { document.getElementById('file-input').click(); }

function handleFileImport(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
        try {
            var d = JSON.parse(ev.target.result);
            if (d.contests) {
                storedVerifier = d.verifier || null;
                storedSalt = d.salt || null;
                contests = d.contests || [];
                contests.forEach(function(c) {
                    if (c.encrypted) c._encrypted = true;
                    else c._encrypted = false;
                });
                currentIdx = -1;
                cryptoKeyB64 = null;
                if (storedVerifier) {
                    var auth = getStoredAuth();
                    if (auth && auth.verifier === storedVerifier) {
                        cryptoKeyB64 = auth.key;
                        decryptAll().then(function() {
                            renderSidebar();
                            if (contests.length > 0) selectContest(0);
                            $('body').toast({ message: '导入成功，共 ' + contests.length + ' 场比赛', class: 'success', position: 'bottom right', displayTime: 2500 });
                        });
                    } else {
                        showUnlockModal();
                        renderSidebar();
                        $('body').toast({ message: '已导入加密档案，请输入密码', class: 'warning', position: 'bottom right', displayTime: 2500 });
                    }
                } else {
                    renderSidebar();
                    if (contests.length > 0) selectContest(0);
                    $('body').toast({ message: '导入成功，共 ' + contests.length + ' 场比赛', class: 'success', position: 'bottom right', displayTime: 2500 });
                }
            } else {
                $('body').toast({ message: '无效的数据文件', class: 'error', position: 'bottom right', displayTime: 2500 });
            }
        } catch(e) {
            $('body').toast({ message: '文件格式错误', class: 'error', position: 'bottom right', displayTime: 2500 });
        }
    };
    reader.readAsText(file);
    e.target.value = '';
}

// ==================== Helpers ====================
function escHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
