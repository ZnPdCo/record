name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - editor_server.py
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install pyinstaller

      - run: pyinstaller --onefile --name OIRecordEditor editor_server.py

      - run: |
          New-Item -ItemType Directory -Path artifacts/dist -Force
          Copy-Item dist/OIRecordEditor.exe artifacts/
          Copy-Item -Recurse dist/assets artifacts/dist/
          Copy-Item dist/index.html artifacts/dist/
          Copy-Item public -Recurse artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: OIRecordEditor-Windows
          path: artifacts/
